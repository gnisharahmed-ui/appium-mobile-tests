name: Mobile Tests (Appium)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  mobile-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android emulator
        run: |
          sdkmanager "system-images;android-33;google_apis;x86_64"
          echo "no" | avdmanager create avd -n Pixel_6_API_33 \
            -k "system-images;android-33;google_apis;x86_64" \
            --device "pixel_6"

      - name: Start Android emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd Pixel_6_API_33 \
            -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82
        timeout-minutes: 5

      - name: Install Node.js and Appium
        run: |
          npm install -g appium@2
          appium driver install uiautomator2

      - name: Start Appium server
        run: appium --log appium.log &

      - name: Download sample APK
        run: |
          mkdir -p apps
          curl -L "https://github.com/saucelabs/sample-app-mobile/releases/download/2.7.1/Android.SauceLabs.Mobile.Sample.app.2.7.1.apk" \
            -o apps/saucelabs-sample.apk

      - name: Run mobile tests
        run: mvn clean test -Ddevice.profile=android-emulator

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-allure-report
          path: target/site/allure-maven-plugin/
          retention-days: 7

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log
